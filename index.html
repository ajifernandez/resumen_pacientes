<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Summary</title>
    <script>
        function calculateEarnings() {
            const dailyPatients = parseInt(document.getElementById('dailyPatients').value) || 0;
            const monthlyPatients = dailyPatients * 30;
            const pricePerPatient = parseFloat(document.getElementById('pricePerPatient').value) || 0;
            const dailyEarnings = dailyPatients * pricePerPatient;
            const monthlyEarnings = monthlyPatients * pricePerPatient;
            document.getElementById('dailyEarnings').innerText = `Daily Earnings: $${dailyEarnings.toFixed(2)}`;
            document.getElementById('monthlyEarnings').innerText = `Monthly Earnings: $${monthlyEarnings.toFixed(2)}`;
        }
    </script>
</head>
<body>
    <h1>Patient Summary</h1>
    <div>
        <label for="dailyPatients">Daily Patient Count:</label>
        <input type="number" id="dailyPatients" placeholder="Enter daily patient count" />
    </div>
    <div>
        <label for="pricePerPatient">Price per Category:</label>
        <input type="number" id="pricePerPatient" placeholder="Enter price per category" step="0.01" />
    </div>
    <button onclick="calculateEarnings()">Calculate Earnings</button>
    <div id="dailyEarnings"></div>
    <div id="monthlyEarnings"></div>
</body>
</html>
