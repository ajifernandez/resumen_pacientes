<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Pacientes - Clínica</title>
    <link rel="stylesheet" href="styles.css">
    <script src="chart.js"></script>
</head>
<body>
    <h1>🏥 Control de Pacientes</h1>
    <div class="tabs">
        <button class="tablinks" onclick="openTab(event, 'EntradaDiaria')">Entrada Diaria</button>
        <button class="tablinks" onclick="openTab(event, 'Estadisticas')">Estadísticas</button>
        <button class="tablinks" onclick="openTab(event, 'Historial')">Historial</button>
        <button class="tablinks" onclick="openTab(event, 'Datos')">Datos</button>
    </div>
    <div id="EntradaDiaria" class="tabcontent">
        <h3>Entrada Diaria</h3>
        <table>
            <thead>
                <tr>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Adeslas</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Asisa</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>AXA</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Caser</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>DKV</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>DKV Revisión</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Mapfre</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Privado</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Privado Efectivo</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Sanitas</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Other</td>
                    <td><input type="number"></td>
                    <td><button onclick="deleteEntry(this)">Eliminar</button></td>
                </tr>
            </tbody>
        </table>
        <button onclick="submitDailyEntry()">Enviar</button>
    </div>
    <div id="Estadisticas" class="tabcontent">
        <h3>Estadísticas</h3>
        <div id="monthlyStats">
            <div class="statCard">
                <h4>Mensual</h4>
                <p id="monthlyTotal">0</p>
            </div>
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>
    <div id="Historial" class="tabcontent">
        <h3>Historial</h3>
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <!-- Historial entries go here -->
            </tbody>
        </table>
    </div>
    <div id="Datos" class="tabcontent">
        <h3>Datos</h3>
        <button onclick="exportToJSON()">Exportar a JSON</button>
        <button onclick="importFromJSON()">Importar desde JSON</button>
        <button onclick="clearAllData()">Limpiar Todos los Datos</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
